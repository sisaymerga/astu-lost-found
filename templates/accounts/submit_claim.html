{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="bi bi-hand-thumbs-up"></i> Claim Item</h4>
                </div>
                <div class="card-body">
                    <div class="mb-4 p-3 bg-light rounded">
                        <h5>{{ item.title }}</h5>
                        <p class="text-muted mb-1">{{ item.description }}</p>
                        <p class="small mb-0"><i class="bi bi-geo-alt"></i> {{ item.location }} | <i class="bi bi-calendar"></i> {{ item.date }}</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="message" class="form-label"><i class="bi bi-chat-text"></i> Proof of ownership / Message</label>
                            <textarea name="message" id="message" class="form-control" rows="5" required></textarea>
                            <div class="form-text">Explain how you can prove this item belongs to you.</div>
                        </div>
                        <button type="submit" class="btn btn-warning"><i class="bi bi-send"></i> Submit Claim</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
